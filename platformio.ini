; PlatformIO Project Configuration for V1 Gen2 Simple Display
; Waveshare ESP32-S3-Touch-LCD-3.49 only
; ========================================
; AXS15231B 640x172 QSPI display
; ========================================

; Default environments for 'pio run' (excludes test-only envs)
[platformio]
default_envs = waveshare-349

[env:waveshare-349]
; Promoted to 55.03.38-1 = Arduino 3.3.8 / ESP-IDF 5.5.4 after hardware
; validation on 2026-05-22: STA maintenance boot connected to saved network
; without WIFI_REASON_AUTH_EXPIRE, Web UI rendered, and bench passed.
; Requires PlatformIO Core >=6.1.19.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
check_tool = cppcheck
check_severity = medium
check_skip_packages = yes
check_flags =
    cppcheck: --suppress=preprocessorErrorDirective:*ArduinoJson*
    cppcheck: --suppress=duplInheritedMember:*GFX*Library*for*Arduino*

; Upload settings
upload_speed = 921600
monitor_speed = 115200
board_upload.flash_size = 16MB
; Flash to the application partition at 0x20000.
; PlatformIO's ESP32 uploader reads this as board.upload.offset_address.
board_upload.offset_address = 0x20000
board_upload.maximum_size = 14155776
extra_scripts =
    pre:scripts/enforce_reorder_warning.py
    pre:scripts/force_app_upload_offset.py
    pre:scripts/get_git_sha.py
    ; Deterministic first-char text placement — see scripts/patch_openfontrender.py.
    pre:scripts/patch_openfontrender.py
    post:scripts/force_app_upload_offset.py

; Build flags
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_SUPPORT
    ; Forward declarations for ps_malloc/ps_calloc/ps_realloc, force-injected
    ; into every TU. Required by .pio/libdeps OpenFontRender (FileSupport.h
    ; aliases ft_smalloc/ft_srealloc to these symbols). DO NOT remove without
    ; first patching OpenFontRender.
    -include ${PROJECT_DIR}/include/psram_alloc_compat.h
    ; Production-tested metrics: bench validates the same waveshare-349 image
    ; that release ships, so keep sampled metrics enabled here until the
    ; production test path changes with it.
    -D PERF_METRICS=1
    -D PERF_MONITORING=1
    ; Waveshare board identifier
    -D DISPLAY_WAVESHARE_349=1
    ; Screen dimensions (rotated landscape)
    -D SCREEN_WIDTH=640
    -D SCREEN_HEIGHT=172
    ; QSPI Display pins
    -D LCD_CS=9
    -D LCD_SCLK=10
    -D LCD_DATA0=11
    -D LCD_DATA1=12
    -D LCD_DATA2=13
    -D LCD_DATA3=14
    -D LCD_RST=21
    -D LCD_BL=8
    ; Use Arduino_GFX for AXS15231B
    -D USE_ARDUINO_GFX=1
    ; QSPI clock speed - 80MHz for faster display flush (default is 40MHz)
    -D ESP32QSPI_FREQUENCY=80000000
    ; NimBLE: platforms 55.03.35 (IDF 5.5.1) and 55.03.38-1 (IDF 5.5.4) ship
    ; an sdkconfig.h that unconditionally defines
    ; CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=5120 and CONFIG_BT_NIMBLE_MAX_CONNECTIONS=3,
    ; overriding command-line -D flags (last #define wins in GCC).
    ; The -D overrides we previously carried (8192 / 4) were ineffective on
    ; both pins; the controller's pre-built libs also cap connections at 3.
    ; Removed to eliminate redefinition warnings.  Effective values: stack=5120, conn=3.
    ; ESP32-S3 BLE controller AGC recorrection — disabled by default in the
    ; Arduino framework sdkconfig.  Without this the controller's automatic gain
    ; control is uncalibrated and RSSI readings are systematically ~30-40 dB too low.
    -D CONFIG_BT_CTRL_AGC_RECORRECT_EN=1

; Required libraries - pinned versions for reproducible builds
; NOTE: Sqlite3Esp32 was removed in v3.0.0.
; Runtime diagnostics now rely on serial logs and perf CSV metrics.
lib_deps = 
    moononournation/GFX Library for Arduino@1.6.5
    h2zero/NimBLE-Arduino@2.5.0
    bblanchon/ArduinoJson@7.4.3
    https://github.com/takkaO/OpenFontRender.git#a9acf5498ed058a034acaa1becbad790627b9ec1

; Board configuration - 16MB flash, 8MB PSRAM
; Custom partition table with 32KB NVS (vs 20KB default) for BLE+WiFi+settings
board_build.partitions = partitions_v1.csv
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi

; Filesystem configuration (for web UI files)
board_build.filesystem = littlefs

; Apply sdkconfig.defaults for IRAM recovery + heap safety
board_build.arduino.extra_config = sdkconfig.defaults

; ========================================
; Car install firmware environment (soldered PWR_BUTTON, no 18650)
; CAR_MODE_PWR_SHORT disables powerOff() and the critical-battery/auto-power
; shutdown paths at compile time. Build with: ./build.sh --car
; ========================================
[env:esp32-s3-car-install]
platform = ${env:waveshare-349.platform}
board = ${env:waveshare-349.board}
framework = ${env:waveshare-349.framework}
upload_speed = ${env:waveshare-349.upload_speed}
monitor_speed = ${env:waveshare-349.monitor_speed}
board_upload.offset_address = ${env:waveshare-349.board_upload.offset_address}
board_upload.maximum_size = ${env:waveshare-349.board_upload.maximum_size}
extra_scripts = ${env:waveshare-349.extra_scripts}
lib_deps = ${env:waveshare-349.lib_deps}
board_build.partitions = ${env:waveshare-349.board_build.partitions}
board_build.flash_mode = ${env:waveshare-349.board_build.flash_mode}
board_build.flash_size = ${env:waveshare-349.board_build.flash_size}
board_build.f_flash = ${env:waveshare-349.board_build.f_flash}
board_build.f_cpu = ${env:waveshare-349.board_build.f_cpu}
board_build.arduino.memory_type = ${env:waveshare-349.board_build.arduino.memory_type}
board_build.filesystem = ${env:waveshare-349.board_build.filesystem}
board_build.arduino.extra_config = ${env:waveshare-349.board_build.arduino.extra_config}
build_flags =
    ${env:waveshare-349.build_flags}
    -D CAR_MODE_PWR_SHORT=1

; ========================================
; Native test environment (runs on host machine)
; For unit testing without hardware
; Use: pio test -e native
; NOTE: Excluded from default 'pio run' via [platformio] default_envs
; ========================================
[env:native]
platform = native
extra_scripts =
    pre:scripts/enforce_reorder_warning.py
    pre:scripts/configure_linked_native_test_sources.py
build_flags =
    -D UNIT_TEST
    -std=c++17
    -I test/mocks
    '-DPROJECT_DIR="${PROJECT_DIR}"'
lib_deps =
    bblanchon/ArduinoJson@7.4.3
test_framework = unity
test_build_src = false
; Device-only tests require ESP32 hardware — skip on native.
; Car-mode tests require -DCAR_MODE_PWR_SHORT=1 — use native_car.
test_ignore = test_device_*, test_car_mode_*

; ========================================
; Native coverage test environment (runs on host machine)
; Clone of [env:native] with gcov instrumentation. Used only by the out-of-band
; coverage lane (scripts/run_firmware_coverage.py) — never by the PR gate. The
; gate would have to carry a whole SECOND native run: measured on one host,
; 149 suites take 170.7s uninstrumented vs 206.6s instrumented (1.21x), plus
; ~24s of gcovr aggregation, i.e. ~+230s on a lane that already runs ~531s
; against a 1200s budget. See .github/workflows/coverage.yml.
;
; Scope note: test_build_src = false, so the native suites compile the units and
; mocks they #include, not the whole firmware. Coverage measured here is coverage
; of the host-testable code the native suites actually build. Device-only driver
; code stays covered by the mutation gate and the device suites.
;
; Flag note: PlatformIO routes build_flags through SCons ParseFlags, which sends
; bare flags to CCFLAGS but only -l flags to LIBS. `--coverage` therefore covers
; the compile half (-fprofile-arcs -ftest-coverage) and `-lgcov` supplies the
; link half. Both are required; dropping -lgcov breaks the link.
; Use: pio test -e native-coverage
; NOTE: Excluded from default 'pio run' via [platformio] default_envs
; ========================================
[env:native-coverage]
platform = native
extra_scripts =
    pre:scripts/enforce_reorder_warning.py
    pre:scripts/configure_linked_native_test_sources.py
build_flags =
    -D UNIT_TEST
    -std=c++17
    -I test/mocks
    '-DPROJECT_DIR="${PROJECT_DIR}"'
    ; Compile-side instrumentation.
    --coverage
    ; Bake absolute source paths into .gcno so gcovr resolves them regardless of
    ; the per-suite PLATFORMIO_BUILD_DIR the serial runner assigns.
    -fprofile-abs-path
    -O0
    -g
    ; Link-side instrumentation (the other half of --coverage).
    -lgcov
lib_deps =
    bblanchon/ArduinoJson@7.4.3
test_framework = unity
test_build_src = false
; Device-only tests require ESP32 hardware — skip on native-coverage.
; Car-mode tests require -DCAR_MODE_PWR_SHORT=1 — use native_car.
test_ignore = test_device_*, test_car_mode_*

; ========================================
; Native car-install test environment
; Runs the native test suite with CAR_MODE_PWR_SHORT=1 to verify compile-time
; gates (no direct, long-press, critical-battery, or auto-power shutdown).
; Use: python3 scripts/run_native_tests_serial.py --env native_car
; ========================================
[env:native_car]
platform = native
extra_scripts = pre:scripts/enforce_reorder_warning.py
build_flags =
    -D UNIT_TEST
    -D CAR_MODE_PWR_SHORT=1
    -std=c++17
    -I test/mocks
    '-DPROJECT_DIR="${PROJECT_DIR}"'
lib_deps =
    bblanchon/ArduinoJson@7.4.3
test_framework = unity
test_build_src = false
; Device-only tests require ESP32 hardware — skip on native_car.
; test_car_mode_* runs only here (requires CAR_MODE_PWR_SHORT=1).
test_ignore = test_device_*

; ========================================
; Native sanitized environment (runs on host machine)
; Address + undefined-behavior sanitizers for manual validation
; Use: pio test -e native-sanitized
; NOTE: Excluded from default 'pio run' via [platformio] default_envs
; ========================================
[env:native-sanitized]
platform = native
extra_scripts =
    pre:scripts/enforce_reorder_warning.py
    pre:scripts/configure_linked_native_test_sources.py
build_flags =
    -D UNIT_TEST
    -std=c++17
    -I test/mocks
    '-DPROJECT_DIR="${PROJECT_DIR}"'
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
    -fno-sanitize-recover=all
    -g
lib_deps =
    bblanchon/ArduinoJson@7.4.3
test_framework = unity
test_build_src = false
; Device-only tests require ESP32 hardware — skip on native-sanitized.
; Car-mode tests require -DCAR_MODE_PWR_SHORT=1 — use native_car.
test_ignore = test_device_*, test_car_mode_*

; ========================================
; Device test environment (runs on ESP32-S3)
; Same tests as native but executed on hardware
; Use: pio test -e device
; NOTE: Excluded from default 'pio run' via [platformio] default_envs
; ========================================
[env:device]
platform = ${env:waveshare-349.platform}
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
test_speed = 115200
; Serial port stabilization for USB CDC
monitor_rts = 0
monitor_dtr = 0
; Give USB CDC time to enumerate after upload before opening serial
extra_scripts =
    pre:scripts/test_delay.py
    pre:scripts/enforce_reorder_warning.py
build_flags = 
    -D UNIT_TEST
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D CONFIG_SPIRAM_SUPPORT
    -std=gnu++17
build_unflags = -std=gnu++11
; Board config for 16MB flash + 8MB PSRAM (must match waveshare-349)
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
lib_deps =
    h2zero/NimBLE-Arduino@2.5.0
    bblanchon/ArduinoJson@7.4.3
test_framework = unity
test_build_src = false
; Ignore native-only tests that use mock headers (millis, Serial, WebServer, etc.)
; or include ../../src/modules/ paths that rely on mock shims.
; Only test_device_* suites and 7 self-contained shared suites compile for device.
test_ignore =
    test_alert_persistence
    test_backup_api_service
    test_connection_state
    test_display_restore_module
    test_power_module
    test_speed_mute
    test_system_event_bus
    test_volume_fade
    test_wifi_autopush_api_service
    test_wifi_boot_policy
    test_wifi_client_api_service
    test_wifi_client_enable_transaction
    test_wifi_scan_result_owner
    test_wifi_api_fixture_emitter
    test_obd_api_fixture_emitter
    test_wifi_api_fixture_remaining_emitter
    test_wifi_display_colors_api_service
    test_wifi_portal_api_service
    test_wifi_settings_api_service
    test_wifi_status_api_service
    test_wifi_v1_profile_api_service
