name: Release

# One-click manual release workflow. Keep this off push-to-main so creating or
# updating the public repository cannot publish a release accidentally.
#
# Steps:
#   1. Calculate and commit the selected semantic-version bump locally
#   2. Run ci-test.sh on that exact release commit
#   3. Build firmware + filesystem using web assets deployed by ci-test.sh
#   4. Merge binaries and stage the GitHub Pages web installer
#   5. Atomically push the release commit and its immutable tag
#   6. Create or update the GitHub Release with generated notes
#   7. Deploy the web installer to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Refresh repository refs
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Releases must be dispatched from main."
            exit 1
          fi
          git fetch --force origin main
          git fetch --force --tags origin

      - name: Find prior publication for this run
        id: resume
        env:
          RELEASE_RUN_ID: ${{ github.run_id }}
        run: python3 scripts/prepare_release.py --lookup-run-id "$RELEASE_RUN_ID"

      - name: Select release base
        id: base
        env:
          RESUME_SHA: ${{ steps.resume.outputs.resume_sha }}
          RESUME_TAG: ${{ steps.resume.outputs.resume_tag }}
        run: |
          if [ -n "$RESUME_TAG" ]; then
            if [ "$(git rev-parse "$RESUME_TAG^{commit}")" != "$RESUME_SHA" ]; then
              echo "::error::Recorded release tag $RESUME_TAG no longer resolves to $RESUME_SHA."
              exit 1
            fi
            if ! git merge-base --is-ancestor "$RESUME_SHA" origin/main; then
              echo "::error::Recorded release $RESUME_TAG is no longer in main history."
              exit 1
            fi
            git checkout --detach "$RESUME_SHA"
            echo "Resuming $RESUME_TAG at $RESUME_SHA for this workflow run."
          else
            git checkout --detach origin/main
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare release version
        id: version
        env:
          RELEASE_BUMP: ${{ inputs.bump }}
        run: python3 scripts/prepare_release.py --bump "$RELEASE_BUMP"

      - name: Create local release commit
        id: release_commit
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- include/config.h CHANGELOG.md; then
            git add include/config.h CHANGELOG.md
            git diff --cached --check
            git commit -m "chore(release): prepare $RELEASE_TAG"
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Release preparation left unexpected working-tree changes."
            git status --short
            exit 1
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install toolchain
        run: |
          pip install "platformio>=6.1.19,<7" esptool "Pillow>=10.4,<13"
          cd interface && npm ci

      - name: Run ci-test.sh gate
        run: ./scripts/ci-test.sh

      - name: Build firmware
        run: pio run -e waveshare-349 -j 1

      - name: Build filesystem
        run: pio run -e waveshare-349 -t buildfs -j 1

      - name: Check LittleFS image/runtime compatibility
        run: python3 scripts/check_littlefs_image_compatibility.py --candidate .pio/build/waveshare-349/littlefs.bin

      - name: Merge firmware for ESP Web Tools
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p release
          cp .pio/build/waveshare-349/bootloader.bin release/
          cp .pio/build/waveshare-349/partitions.bin release/
          cp .pio/build/waveshare-349/firmware.bin release/
          cp .pio/build/waveshare-349/littlefs.bin release/

          esptool --chip esp32s3 merge-bin \
            -o release/merged-firmware.bin \
            --flash-mode dio \
            --flash-freq 80m \
            --flash-size 16MB \
            0x0000 release/bootloader.bin \
            0x8000 release/partitions.bin \
            0x20000 release/firmware.bin \
            0xda0000 release/littlefs.bin

          python3 scripts/check_release_image_info.py \
            --image release/merged-firmware.bin \
            --env waveshare-349

          python3 - <<'PY'
          import json, os
          from pathlib import Path
          manifest = {
              "name": "V1-Simple",
              "version": os.environ["RELEASE_TAG"],
              "home_assistant_domain": "",
              "funding_url": "",
              "new_install_prompt_erase": True,
              "new_install_improv_wait_time": 0,
              "builds": [{
                  "chipFamily": "ESP32-S3",
                  "parts": [{"path": "merged-firmware.bin", "offset": 0}],
              }],
          }
          Path("release/manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Stage GitHub Pages installer
        run: |
          mkdir -p release/pages/licenses
          cp web-installer/index.html release/pages/index.html
          cp release/manifest.json release/pages/manifest.json
          cp release/merged-firmware.bin release/pages/merged-firmware.bin
          cp THIRD_PARTY_NOTICES.md release/THIRD_PARTY_NOTICES.md
          cp licenses/ArduinoJson-LICENSE.txt release/ArduinoJson-LICENSE.txt
          cp licenses/NimBLE-Arduino-LICENSE.txt release/NimBLE-Arduino-LICENSE.txt
          cp licenses/NimBLE-Arduino-NOTICE.txt release/NimBLE-Arduino-NOTICE.txt
          cp licenses/Arduino-GFX-LICENSE.txt release/Arduino-GFX-LICENSE.txt
          cp licenses/OpenFontRender-LICENSE.txt release/OpenFontRender-LICENSE.txt
          cp licenses/FreeType-FTL.txt release/FreeType-FTL.txt
          cp licenses/Svelte-LICENSE.md release/Svelte-LICENSE.md
          cp licenses/SvelteKit-LICENSE.txt release/SvelteKit-LICENSE.txt
          cp licenses/daisyUI-LICENSE.txt release/daisyUI-LICENSE.txt
          cp licenses/Tailwind-CSS-LICENSE.txt release/Tailwind-CSS-LICENSE.txt
          cp THIRD_PARTY_NOTICES.md release/pages/THIRD_PARTY_NOTICES.md
          cp licenses/ArduinoJson-LICENSE.txt release/pages/licenses/ArduinoJson-LICENSE.txt
          cp licenses/NimBLE-Arduino-LICENSE.txt release/pages/licenses/NimBLE-Arduino-LICENSE.txt
          cp licenses/NimBLE-Arduino-NOTICE.txt release/pages/licenses/NimBLE-Arduino-NOTICE.txt
          cp licenses/Arduino-GFX-LICENSE.txt release/pages/licenses/Arduino-GFX-LICENSE.txt
          cp licenses/OpenFontRender-LICENSE.txt release/pages/licenses/OpenFontRender-LICENSE.txt
          cp licenses/FreeType-FTL.txt release/pages/licenses/FreeType-FTL.txt
          cp licenses/Svelte-LICENSE.md release/pages/licenses/Svelte-LICENSE.md
          cp licenses/SvelteKit-LICENSE.txt release/pages/licenses/SvelteKit-LICENSE.txt
          cp licenses/daisyUI-LICENSE.txt release/pages/licenses/daisyUI-LICENSE.txt
          cp licenses/Tailwind-CSS-LICENSE.txt release/pages/licenses/Tailwind-CSS-LICENSE.txt
          python3 scripts/check_web_installer_page.py --site-dir release/pages

      - name: Upload image-info evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-image-info-${{ steps.version.outputs.tag }}
          path: release/merged-firmware-image-info.txt
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload GitHub Pages installer artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: release/pages

      - name: Publish release commit and tag
        id: publish
        env:
          BASE_SHA: ${{ steps.base.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]; then
            echo "::error::Release SHA no longer matches the tested working tree."
            exit 1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Refusing to publish a dirty release working tree."
            git status --short
            exit 1
          fi

          git fetch --force origin main
          git fetch --force --tags origin
          if git rev-parse --verify "$RELEASE_TAG^{commit}" >/dev/null 2>&1; then
            EXISTING_SHA="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [ "$EXISTING_SHA" != "$RELEASE_SHA" ]; then
              echo "::error::Tag $RELEASE_TAG already exists at $EXISTING_SHA; it will not be moved."
              exit 1
            fi
            echo "Tag $RELEASE_TAG already points at tested commit $RELEASE_SHA; reusing it."
          else
            REMOTE_MAIN_SHA="$(git rev-parse origin/main)"
            if [ "$REMOTE_MAIN_SHA" != "$BASE_SHA" ]; then
              echo "::error::main advanced from $BASE_SHA to $REMOTE_MAIN_SHA during the release. Rerun from current main."
              exit 1
            fi
            git tag -a "$RELEASE_TAG" "$RELEASE_SHA" \
              -m "Release $RELEASE_TAG" \
              -m "Release-Run-ID: $RELEASE_RUN_ID"
            AUTH_VALUE="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w 0)"
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH_VALUE" \
              push --atomic origin \
              HEAD:refs/heads/main \
              "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          fi
          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # v3.0.2, pinned so a mutable tag cannot change code running with contents:write.
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.bin
            release/manifest.json
            release/THIRD_PARTY_NOTICES.md
            release/ArduinoJson-LICENSE.txt
            release/NimBLE-Arduino-LICENSE.txt
            release/NimBLE-Arduino-NOTICE.txt
            release/Arduino-GFX-LICENSE.txt
            release/OpenFontRender-LICENSE.txt
            release/FreeType-FTL.txt
            release/Svelte-LICENSE.md
            release/SvelteKit-LICENSE.txt
            release/daisyUI-LICENSE.txt
            release/Tailwind-CSS-LICENSE.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          {
            echo "## Released ${{ steps.version.outputs.tag }}"
            echo ""
            echo "- Firmware version and changelog prepared automatically"
            echo "- Tested release commit: ${{ steps.publish.outputs.sha }}"
            echo "- Release commit and tag published atomically or safely reused"
            echo "- GitHub Release published with firmware, filesystem, merged installer binary, and ESP Web Tools manifest"
            echo "- Third-party notices and runtime license texts published with the release and installer"
            echo "- Image-info report uploaded as workflow evidence"
            echo "- GitHub Pages installer artifact staged from the same manifest and merged image"
          } >> $GITHUB_STEP_SUMMARY

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages installer
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
